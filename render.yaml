services:

  # =========================
  # BACKEND API
  # =========================
  - type: web
    name: backend-api
    env: python
    buildCommand: ""
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    plan: starter

  # =========================
  # FRONTEND DIPENDENTI
  # =========================
  - type: web
    name: frontend-dipendenti
    env: python
    buildCommand: ""
    startCommand: streamlit run frontend/app_dipendenti.py --server.port 10000 --server.address 0.0.0.0
    plan: starter

  # =========================
  # ADMIN DASHBOARD
  # =========================
  - type: web
    name: admin-dashboard
    env: python
    buildCommand: ""
    startCommand: streamlit run admin/app_admin.py --server.port 10000 --server.address 0.0.0.0
    plan: starter
