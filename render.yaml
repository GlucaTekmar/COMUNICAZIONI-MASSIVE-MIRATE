services:
  - type: web
    name: comunicazioni-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: comunicazioni-db
          property: connectionString

  - type: web
    name: comunicazioni-frontend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: streamlit run frontend/app.py --server.port 10001 --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        value: https://comunicazioni-backend.onrender.com

databases:
  - name: comunicazioni-db
    plan: free
